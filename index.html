<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gavhar Restaurant</title>
    <link rel="icon" type="image/png" href="img/Gavhar logo-02 1 123.png" />
    <link
      rel="shortcut icon"
      type="image/png"
      href="img/Gavhar logo-02 1 123.png"
    />
    <link rel="apple-touch-icon" href="img/Gavhar logo-02 1 123.png" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <!-- Header Section -->
      <header class="header">
        <div class="logo-container">
          <img src="img/Gavhar logo-01.png" alt="Gavhar Logo" class="logo" />
          <h1 class="restaurant-name">Gavhar Restaurant</h1>
          <p class="cuisine-description">
            <span class="chef-icon">👨‍🍳</span>
            Mualliflik yondashuvi bilan noyob oshxona
          </p>
        </div>
      </header>

      <!-- Social Media Section -->
      <section class="social-section">
        <div class="social-icons">
          <a
            href="https://www.instagram.com/gavhar2_restaurant?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw=="
            class="social-icon"
            aria-label="Instagram"
          >
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"
              />
            </svg>
          </a>
          <a
            href="https://t.me/gavhar_oper"
            class="social-icon"
            aria-label="Telegram"
          >
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"
              />
            </svg>
          </a>
          <a
            href="https://www.youtube.com/@Gavhar-Restaurant/shorts"
            class="social-icon"
            aria-label="YouTube"
          >
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"
              />
            </svg>
          </a>
        </div>
        <p class="contact-label">Aloqa</p>
        <p class="contact-info">+99878-333-30-00</p>
      </section>

      <!-- Main Navigation -->
      <section class="main-nav">
        <div class="nav-background">
          <div class="decorative-pattern"></div>
        </div>
        <div class="nav-buttons">
          <a href="https://gavharestaurant.uz/" class="nav-button">
            <span class="button-icon">🍽️</span>
            <span class="button-text">MENU</span>
          </a>
          <a href="https://gavharestaurant2.uz/" class="nav-button">
            <span class="button-icon">🍽️</span>
            <span class="button-text">GAVHAR 2 MENU</span>
          </a>
          <a href="#" class="nav-button" id="feedback-btn">
            <span class="button-icon">💬</span>
            <span class="button-text">ОТЗЫВЫ И ПРЕДЛОЖЕНИЯ</span>
          </a>
          <a href="tel:+998783333000" class="nav-button">
            <span class="button-icon">📞</span>
            <span class="button-text">СВЯЗАТЬСЯ С НАМИ</span>
          </a>
        </div>
      </section>

      <!-- Location Section -->
      <section class="calendar-section">
        <div class="location-card">
          <div class="location-header">
            <span class="location-icon">📍</span>
            <h3 class="location-title">Наше местоположение</h3>
          </div>
          <div class="location-map">
            <iframe
              src="https://yandex.uz/map-widget/v1/-/CLcy7Hp1"
              width="100%"
              height="200"
              style="border: 0; border-radius: 12px"
              allowfullscreen="true"
              loading="lazy"
            ></iframe>
          </div>
          <div class="location-info">
            <p class="location-address">📍 Ургенч, ул. Хонка, дом 9</p>
            <p class="location-hours">🕐 Ежедневно: 10:00 - 23:00</p>
          </div>
        </div>
      </section>
    </div>

    <!-- Feedback Modal -->
    <div id="feedback-modal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2 class="modal-title">ОТЗЫВЫ И ПРЕДЛОЖЕНИЯ</h2>
          <button class="modal-close" id="close-modal">&times;</button>
        </div>
        <form id="feedback-form" class="feedback-form">
          <div class="form-group">
            <label for="feedback-name">Ваше имя</label>
            <input
              type="text"
              id="feedback-name"
              name="name"
              placeholder="Введите ваше имя"
              required
            />
          </div>
          <div class="form-group">
            <label for="feedback-phone">Телефон (необязательно)</label>
            <input
              type="tel"
              id="feedback-phone"
              name="phone"
              placeholder="+998 XX XXX XX XX"
            />
          </div>
          <div class="form-group">
            <label for="feedback-message">Ваш отзыв или предложение</label>
            <textarea
              id="feedback-message"
              name="message"
              rows="5"
              placeholder="Опишите ваше предложение или жалобу..."
              required
            ></textarea>
          </div>
          <button type="submit" class="submit-btn" id="submit-feedback">
            <span>Отправить</span>
          </button>
          <div id="form-status" class="form-status"></div>
        </form>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
